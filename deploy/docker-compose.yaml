version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # 1. Cloud SQL Auth Proxy: Garante a conexão privada e criptografada com o PostgreSQL
  # ---------------------------------------------------------------------------
  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.2
    container_name: cloud-sql-proxy
    command:
      - "--private-ip"
      - "--port=5432"
      - "projeto-ai-ml-develop:southamerica-east1:openwebui-db"
    restart: always
    expose:
      - "5432"
    networks:
      - onr_ia_network
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "5432"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # 2. LiteLLM Auth Bridge: Ponte de autenticação usando credenciais do LiteLLM
  # ---------------------------------------------------------------------------
  litellm-auth-bridge:
    image: python:3.11-slim
    container_name: litellm-auth-bridge
    restart: always
    expose:
      - "5000"
    volumes:
      - ./auth_bridge:/app
    working_dir: /app
    environment:
      - LITELLM_API_BASE=http://10.75.0.3:4000
    command: >
      bash -c "pip install fastapi uvicorn requests && uvicorn main:app --host 0.0.0.0 --port 5000"
    networks:
      - onr_ia_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # 2. Open WebUI: Interface de Chat Oficial para Colaboradores do ONR
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    expose:
      - "8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # Conexão JDBC criptografada mapeada localmente via Cloud SQL Proxy
      - DATABASE_URL=postgresql://user_openwebui:${DB_PASSWORD}@cloud-sql-proxy:5432/db_openwebui?sslmode=disable
      
      # Pool de Conexões Otimizado do SQLAlchemy
      - DATABASE_POOL_SIZE=20
      - DATABASE_POOL_MAX_OVERFLOW=10
      - DATABASE_POOL_RECYCLE=1800
      - DATABASE_POOL_TIMEOUT=30
      
      # Conexão de rede com o gateway LiteLLM externo na VPC do ONR (Chave sob controle do Usuário)
      - OPENAI_API_BASE_URL=http://10.75.0.3:4000/v1
      - OPENAI_API_KEY=                 # Força a interface a exigir a chave privada individual de cada usuário
      - OPENAI_API_BASE_URLS=http://10.75.0.3:4000/v1
      - OPENAI_API_KEYS=""
      
      # Autenticação Integrada via Base do LiteLLM (Trusted Header Auth via Bridge)
      - ENABLE_SIGNUP=false             # Desativa cadastros comuns locais
      - ENABLE_OAUTH_SIGNUP=false       # Desativa login externo via Google SSO/OIDC
      - WEBUI_AUTH=true                 # Ativa autenticação delegada (Trusted Header Auth)
      - WEBUI_AUTH_TRUSTED_EMAIL_HEADER=X-User-Email
      - WEBUI_AUTH_TRUSTED_NAME_HEADER=X-User-Name
      - DEFAULT_USER_ROLE=user          # Papel inicial padrão para novos perfis criados
      
      # Otimização de Concorrência e Workers (Mitigação de OOM na VM física)
      - WEB_CONCURRENCY=3
    depends_on:
      cloud-sql-proxy:
        condition: service_healthy
      litellm-auth-bridge:
        condition: service_healthy
    networks:
      - onr_ia_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # 3. Proxy Reverso Nginx: Terminação SSL/HTTP e Proteção de Borda
  # ---------------------------------------------------------------------------
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80" # Mapeia porta HTTP 80 para acesso flexível sem DNS e SSL provisórios
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - open-webui
    networks:
      - onr_ia_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  onr_ia_network:
    driver: bridge

volumes:
  openwebui_data:
    driver: local
