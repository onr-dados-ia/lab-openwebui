services:
  # ---------------------------------------------------------------------------
  # 1. Open WebUI: Interface de Chat Oficial para Colaboradores do ONR
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    # Publica direto no host (acesso via IP interno pela VPN: http://10.75.0.3:8080),
    # mesmo padrão do LiteLLM (:4000). Servido na RAIZ para evitar o bug de subpath.
    ports:
      - "8080:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # Conexão JDBC direta via IP Privado do Cloud SQL (Lido diretamente da memória pelo Secret Manager)
      - DATABASE_URL=postgresql://user_openwebui:${DB_PASSWORD}@${DB_HOST}:5432/db_openwebui?sslmode=require
      
      # Pool de Conexões Otimizado do SQLAlchemy
      - DATABASE_POOL_SIZE=20
      - DATABASE_POOL_MAX_OVERFLOW=10
      - DATABASE_POOL_RECYCLE=1800
      - DATABASE_POOL_TIMEOUT=30
      
      # Conexão direta com o container do LiteLLM pela rede Docker compartilhada (Chave sob controle do Usuário)
      - OPENAI_API_BASE_URL=http://litellm-gateway:4000/v1
      - OPENAI_API_KEY=                 # Força a interface a exigir a chave privada individual de cada usuário
      - OPENAI_API_BASE_URLS=http://litellm-gateway:4000/v1
      - OPENAI_API_KEYS=""
      
      # Autenticação NATIVA do Open WebUI (login próprio com e-mail/senha no Cloud SQL)
      # Cadastros públicos fechados: somente o admin cria novos usuários no painel.
      - ENABLE_SIGNUP=false             # Bloqueia auto-cadastro (admin gerencia usuários)
      - ENABLE_OAUTH_SIGNUP=false       # Desativa login externo via Google SSO/OIDC
      - WEBUI_AUTH=true                 # Mantém autenticação (agora nativa, não delegada)
      - DEFAULT_USER_ROLE=user          # Papel inicial padrão para novos perfis criados
      
      # URL base do portal (raiz, acesso por IP interno via VPN).
      # Futuramente trocar para https://dados-ia.onr.org.br quando publicar via DNS/LB.
      - WEBUI_URL=http://10.75.0.3:8080
      
      # Otimização de Concorrência e Workers (Mitigação de OOM na VM física)
      - WEB_CONCURRENCY=3
    networks:
      - onr_ia_network
      - litellm_shared
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3

networks:
  onr_ia_network:
    driver: bridge
  # Rede pré-existente da stack do LiteLLM nesta mesma VM (permite resolver 'litellm-gateway' por nome)
  litellm_shared:
    external: true
    name: litellm-gateway_default

volumes:
  openwebui_data:
    driver: local
