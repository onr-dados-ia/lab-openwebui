events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Otimização de I/O de rede
    sendfile        on;
    keepalive_timeout  65;
    
    # Configurações de SSL Corporativo Blindado
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server {
        # Configuração para aceitar tráfego HTTP na porta 80 caso não usem HTTPS de início por causa do IP
        listen 80;
        listen [::]:80;
        
        # Aceita conexões direcionadas a qualquer IP (Catch-all)
        server_name _;

        # Proteções de Borda adaptadas para escutar múltiplos domínios ou IPs
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Libera origens dinamicamente atreladas ao Host da requisição para funcionamento por IP
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-API-Key, X-Product-Token" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Configurações de timeout estendidas para respostas de streaming de IA
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        send_timeout          600s;

        location / {
            # Encaminha o tráfego de forma interna para o container do Open WebUI
            proxy_pass http://open-webui:8080;
            proxy_http_version 1.1;
            
            # Repasse de cabeçalhos originais para o correto funcionamento do WebSockets e Streaming (SSE)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Metadados do cliente de rede
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Desabilita buffering para streaming SSE (Server-Sent Events) em tempo real de tokens de chat
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
