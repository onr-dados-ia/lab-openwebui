events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Otimização de I/O de rede
    sendfile        on;
    keepalive_timeout  65;
    
    # Configurações de SSL Corporativo Blindado
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server {
        # Configuração para aceitar tráfego HTTP na porta 80 caso não usem HTTPS de início por causa do IP
        listen 80;
        listen [::]:80;
        
        # Aceita conexões direcionadas a qualquer IP (Catch-all)
        server_name _;

        # Proteções de Borda adaptadas para escutar múltiplos domínios ou IPs
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Libera origens dinamicamente atreladas ao Host da requisição para funcionamento por IP
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-API-Key, X-Product-Token" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Configurações de timeout estendidas para respostas de streaming de IA
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        send_timeout          600s;

        # Endpoint de validação de login (Ponte de autenticação LiteLLM)
        location /auth-login {
            internal;
            proxy_pass http://litellm-auth-bridge:5000/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # Redireciona a raiz para o subcaminho /chat/ caso acessem direto a VM
        location = / {
            return 301 /chat/;
        }

        # Rota de saúde pública para o Health Check do Load Balancer do GCP (Sem auth_request)
        location /chat/health {
            proxy_pass http://open-webui:8080/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Configuração para o subcaminho /chat/ gerenciado pelo Load Balancer
        location /chat/ {
            # Desafia a autenticação por cabeçalho do LiteLLM via Auth Bridge
            auth_request /auth-login;
            
            # Se a autenticação na ponte falhar (401), o Nginx chama o bloco de tratamento de erro para exibir o pop-up
            error_page 401 = @error401;
            
            # Se autenticado, repassa os headers retornados da Bridge para logar no Open WebUI
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_name $upstream_http_x_user_name;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Name $user_name;

            # Encaminha o tráfego removendo o prefixo /chat/ para o container do Open WebUI que roda em root /
            proxy_pass http://open-webui:8080/;
            proxy_http_version 1.1;
            
            # Repasse de cabeçalhos originais para o correto funcionamento do WebSockets e Streaming (SSE)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Metadados do cliente de rede
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Desabilita buffering para streaming SSE (Server-Sent Events) em tempo real de tokens de chat
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
        }

        # Bloco de tratamento de erro 401 para forçar o navegador a abrir a caixinha cinza de login
        location @error401 {
            add_header WWW-Authenticate 'Basic realm="Acesso Portal de IA do ONR - Use seu login do LiteLLM"' always;
            return 401;
        }
    }
}
